# Phase 1 ingest configuration.
#
# Read by scripts/phase1_ingest.py at runtime. Category-to-kind routing now
# lives in game-config.json (`categories` field, produced by Phase 0).

[wiki]
name = "They Are Billions"
base_url = "https://they-are-billions.fandom.com/wiki/"
api_endpoint = "https://they-are-billions.fandom.com/api.php"
source_revision_strategy = "mediawiki-revid"

[ingest]
concurrency = 4
retry_count = 3
request_delay_ms = 250
user_agent = "cloneGame-phase1/0.1 (research; contact: mutaphoenix@gmail.com)"

[compile]
# Path to the system prompt file used for wikitext -> vault markdown compilation.
system_prompt_path = "prompts/wiki-compile-system.md"
# Headless LLM mode/model defaults now live in pipeline.config.toml.

[cache]
# Content-hash cache directory. Each entry stores the source revision hash so
# unchanged pages skip the LLM call on re-runs.
dir = ".phase1_cache"

[quarantine]
# Files failing schema validation are written here with a `validation_errors:`
# YAML block and excluded from Phase 2 bundling.
output_dir = "vault/_quarantine/"
fail_on_unknown_kind = true
fail_on_missing_required_field = true
